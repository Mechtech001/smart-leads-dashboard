version: '3.8'

services:
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  server:
    build: ./server
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongo:27017/smartleads
      - JWT_SECRET=your_jwt_secret_here_make_it_long_and_secure
      - NODE_ENV=production
    depends_on:
      - mongo

  client:
    build: ./client
    ports:
      - '3000:80'
    depends_on:
      - server

volumes:
  mongo_data:
